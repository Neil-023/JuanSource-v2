services:
  db:
    image: pgvector/pgvector:pg16
    container_name: juansource-db
    restart: always # Changed from unless-stopped for better auto-recovery
    deploy:
      resources:
        limits:
          memory: 256M # The "Safety Ceiling"
        reservations:
          memory: 128M # The "Guaranteed Minimum"
    environment:
      POSTGRES_DB: juansource
      POSTGRES_USER: juansource
      POSTGRES_PASSWORD: juansource
    ports:
      - "127.0.0.1:5432:5432" # Secure: Only the server itself can talk to the DB
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U juansource -d juansource"]
      interval: 10s
      timeout: 5s
      retries: 6

  backend:
    build:
      context: ./backend
    container_name: juansource-backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://juansource:juansource@db:5432/juansource
      SEMANTIC_CACHE_ENABLED: "true"
      SEMANTIC_CACHE_MIN_SIMILARITY: "0.87"
      SEMANTIC_CACHE_TTL_SECONDS: "86400"
      SEMANTIC_CACHE_EMBEDDING_MODEL: models/text-embedding-004
      DAILY_PROMPT_LIMIT: "3"
      RATE_LIMIT_TIMEZONE: Asia/Manila
      ANON_COOKIE_NAME: juansource_anon
      ANON_COOKIE_SECURE: "false"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8001:8000" # Secure: Hide the backend from the public internet
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api # Fixed: No more localhost hardcoded!
    container_name: juansource-frontend
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:5173:80" # Secure: Pass through Nginx only
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata: