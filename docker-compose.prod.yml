services:
  db:
    image: pgvector/pgvector:pg16
    container_name: juansource-db-prod
    restart: always
    mem_limit: 220m
    mem_reservation: 120m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: juansource
      POSTGRES_USER: juansource
      POSTGRES_PASSWORD: juansource
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U juansource -d juansource"]
      interval: 30s
      timeout: 5s
      retries: 4

  backend:
    build:
      context: ./backend
    container_name: juansource-backend-prod
    restart: always
    mem_limit: 280m
    mem_reservation: 160m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://juansource:juansource@db:5432/juansource
      SEMANTIC_CACHE_ENABLED: "true"
      SEMANTIC_CACHE_MIN_SIMILARITY: "0.87"
      SEMANTIC_CACHE_TTL_SECONDS: "86400"
      SEMANTIC_CACHE_EMBEDDING_MODEL: models/text-embedding-004
      DAILY_PROMPT_LIMIT: "3"
      RATE_LIMIT_TIMEZONE: Asia/Manila
      ANON_COOKIE_NAME: juansource_anon
      ANON_COOKIE_SECURE: "true"
      ANON_COOKIE_SAMESITE: "none"
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs', timeout=5)\""]
      interval: 30s
      timeout: 5s
      retries: 4

  nginx:
    image: nginx:1.27-alpine
    container_name: juansource-nginx-prod
    restart: always
    mem_limit: 64m
    mem_reservation: 32m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "127.0.0.1:3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 4

volumes:
  pgdata:
