name: Deploy JuanSource

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:


concurrency:
  group: deploy-juansource
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Prepare frontend env
      working-directory: frontend
      run: |
        cat > .env.production <<'EOF'
        ${{ secrets.JUANSOURCE_FRONTEND_ENV }}
        EOF

    - name: Build frontend dist in CI
      working-directory: frontend
      run: |
        npm ci
        npm run build
        rm -f .env.production
        rm -rf node_modules

    - name: Copy project via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 161.118.239.128
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "docker-compose.prod.yml,backend,frontend,nginx.conf"
        target: "/home/ubuntu/JuanSource"

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: 161.118.239.128
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          set -euo pipefail
          cd /home/ubuntu/JuanSource

          compose() {
            if docker compose version >/dev/null 2>&1; then
              LEGACY_COMPOSE=0
              docker compose "$@"
            elif command -v docker-compose >/dev/null 2>&1; then
              LEGACY_COMPOSE=1
              docker-compose "$@"
            else
              echo "No Docker Compose command found on server" >&2
              exit 1
            fi
          }

          mkdir -p backend
          cat > backend/.env <<'EOF'
          ${{ secrets.JUANSOURCE_BACKEND_ENV }}
          EOF

          docker build -f frontend/Dockerfile.prod -t juansource-frontend:prod frontend

          if [ "${LEGACY_COMPOSE:-1}" -eq 1 ]; then
            for name in juansource-frontend-prod juansource-backend-prod juansource-db-prod juansource-nginx-prod; do
              ids="$(docker ps -aq --filter "name=${name}" || true)"
              if [ -n "${ids}" ]; then
                docker rm -f ${ids} >/dev/null 2>&1 || true
              fi
            done
            compose -f docker-compose.prod.yml down --remove-orphans || true
            compose -f docker-compose.prod.yml up -d --build
          else
            compose -f docker-compose.prod.yml up -d --build --remove-orphans
          fi

          docker image prune -f
