name: Deploy JuanSource Frontend (GitHub Pages)

on:
  push:
    branches: [ main, master ]
    paths:
    - 'frontend/**'
    - '.github/workflows/deploy-frontend-pages.yml'
  workflow_dispatch:


permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-juansource-frontend-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Compute Vite base path for Pages
      run: |
        repo_name="${GITHUB_REPOSITORY#*/}"
        owner_pages_repo="${GITHUB_REPOSITORY_OWNER}.github.io"
        if [ "${repo_name,,}" = "${owner_pages_repo,,}" ]; then
          echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
        else
          echo "VITE_BASE_PATH=/${repo_name}/" >> "$GITHUB_ENV"
        fi

    - name: Build frontend
      working-directory: frontend
      env:
        VITE_API_BASE: ${{ secrets.JUANSOURCE_FRONTEND_API_BASE }}
        VITE_TURNSTILE_SITE_KEY: ${{ secrets.JUANSOURCE_TURNSTILE_SITE_KEY }}
      run: |
        npm ci
        npm run build

    - name: Configure GitHub Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
